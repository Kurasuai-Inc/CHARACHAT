name: Deploy CHARACHAT API

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: charachat-cloud-run
  cancel-in-progress: true

env:
  SERVICE_NAME: charachat-api
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
  VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
  VITE_CHARAHOME_ENV: ${{ vars.CHARAHOME_ENVIRONMENT }}
  VITE_CHARAHOME_APP_ID: charachat_web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository exists
        shell: bash
        run: |
          gcloud config set project "$GCP_PROJECT_ID"
          if ! gcloud artifacts repositories describe "$GAR_REPOSITORY" --location "$GAR_LOCATION" >/dev/null 2>&1; then
            gcloud artifacts repositories create "$GAR_REPOSITORY" \
              --location "$GAR_LOCATION" \
              --repository-format docker \
              --description "CHARACHAT Cloud Run images"
          fi

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - id: image
        name: Compute image URI
        shell: bash
        run: |
          IMAGE_URI="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${SERVICE_NAME}:${GITHUB_SHA}"
          echo "uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.uri }}
          build-args: |
            VITE_FIREBASE_API_KEY=${{ env.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ env.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ env.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ env.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ env.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ env.VITE_FIREBASE_APP_ID }}
            VITE_CHARAHOME_ENV=${{ env.VITE_CHARAHOME_ENV }}
            VITE_CHARAHOME_APP_ID=${{ env.VITE_CHARAHOME_APP_ID }}

      - id: deploy
        name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.image.outputs.uri }}
          flags: --allow-unauthenticated --service-account=${{ env.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
          env_vars: |-
            FIREBASE_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
            CHARAHOME_ENVIRONMENT=${{ vars.CHARAHOME_ENVIRONMENT }}
            CHARAHOME_API_BASE_URL=${{ vars.CHARAHOME_API_BASE_URL }}
            CHARAHOME_AUTH_TOKEN=${{ secrets.CHARAHOME_AUTH_TOKEN }}
            CHARADESK_RUNTIME_BASE_URL=${{ vars.CHARADESK_RUNTIME_BASE_URL }}
            CHARADESK_SIBLING_SHARED_SECRET=${{ secrets.CHARADESK_SIBLING_SHARED_SECRET }}
            CHARACHAT_DATA_DIR=/tmp/charachat-data
            NODE_ENV=production

      - id: public-url
        name: Resolve public base URL
        shell: bash
        env:
          CUSTOM_PUBLIC_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          if [ -n "$CUSTOM_PUBLIC_BASE_URL" ]; then
            BASE_URL="$CUSTOM_PUBLIC_BASE_URL"
          else
            BASE_URL="$DEPLOY_URL"
          fi
          echo "value=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Persist PUBLIC_API_BASE_URL
        run: |
          gcloud run services update "$SERVICE_NAME" \
            --region "$GCP_REGION" \
            --update-env-vars "PUBLIC_API_BASE_URL=${{ steps.public-url.outputs.value }}"

      - name: Smoke test
        run: curl --fail "${{ steps.public-url.outputs.value }}/health"
